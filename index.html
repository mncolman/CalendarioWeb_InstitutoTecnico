<!DOCTYPE html>
<html lang="es" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Acceso — Instituto Técnico</title>
    <link rel="icon" type="image/jpg" href="./assets/logo-it.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="./css/login.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script type="module" src="js/login.js"></script>


</head>

<body>

    <div class="card-login">

        <div class="card-header">
            <div class="card-header-content">
                <div class="logo-wrapper">
                    <img src="/assets/logo-it.jpg" alt="Logo Instituto Técnico">
                </div>
                <h1>Instituto Técnico</h1>
                <p>Universidad Nacional de Tucumán</p>
            </div>
        </div>

        <div class="card-body">
            <div class="campo">
                <label for="input-usuario">Usuario</label>
                <input type="text" id="input-usuario" placeholder="Ingresá tu DNI" autocomplete="off">
            </div>

            <div class="campo">
                <label for="input-password">Contraseña</label>
                <input type="password" id="input-password" placeholder="••••••••" autocomplete="off">
            </div>

            <button class="btn-ingresar" id="btn-ingresar">INGRESAR</button>

            <div class="mensaje-error" id="mensaje-error">
                Usuario o contraseña incorrectos.
            </div>
        </div>

        <div class="card-footer">
            Acceso exclusivo para personal y alumnos del instituto
        </div>

    </div>

</body>

</html>
