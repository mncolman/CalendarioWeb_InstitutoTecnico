<!DOCTYPE html>

<html lang="es" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">

    <title>Calendario Instituto Tecnico</title>
    <base target="_top">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css">
    <link rel="icon" type="image/jpg" href="assets/logo-it.jpg">

    <link rel="stylesheet" href="css/estilos.css">
    <script type="module" src="js/app.js"></script>
</head>

<body>
    <main class="contenedor-principal">
        <section id="encabezado">
            <h2>CALENDARIO INSTITUTO TECNICO</h2>
            <figure>
                <img src="assets/logo-it.jpg" alt="">
            </figure>
        </section>

        <nav class="navbar-principal">

            <button class="menu-toggle" id="btn-menu">
                <span>
                    ☰
                </span>
            </button>

            <div class="nav-colapsable" id="menu-colapsable">

                <ul class="nav-enlaces">
                    <li><a href="#calendario" class="activo">Calendario</a></li>
                    <li><a aria-disabled="true" href="#mapa">Mapa Instituto</a></li>
                    <!--     <li><a href="#libro">Libro de Temas</a></li> -->
                </ul>


                <div class="nav-usuario">
                    <span id="saludo-usuario" class="saludo"></span>
                    <button id="btn-cerrar-sesion" type="button" class="btn-salir">Cerrar Sesión</button>
                </div>

            </div>
        </nav>

        <div id="controles-busqueda" class="controles-busqueda"
            style="margin-bottom: 0.6em; display: flex; flex-direction: column; gap: 10px;">

            <Section class="fila-superior" style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">

                <select id="selectorEspacio"
                    style="padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; min-width: 140px;">
                    <option value="">Sincronizando...</option>
                </select>

                <select id="filtro-division"
                    style="padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; min-width: 140px;">
                    <option value="">Todas las divisiones</option>
                    <option value="1º AÑO A">1º AÑO A</option>
                    <option value="1º AÑO B">1º AÑO B</option>
                    <option value="1º AÑO C">1º AÑO C</option>
                    <option value="2º AÑO A">2º AÑO A</option>
                    <option value="2º AÑO B">2º AÑO B</option>
                    <option value="2º AÑO C">2º AÑO C</option>
                    <option value="3º AÑO A">3º AÑO A</option>
                    <option value="3º AÑO B">3º AÑO B</option>
                    <option value="3º AÑO C">3º AÑO C</option>
                    <option value="4º AÑO MMO A">4º AÑO MMO A</option>
                    <option value="4º AÑO MMO B">4º AÑO MMO B</option>
                    <option value="4º AÑO TME A">4º AÑO TME A</option>
                    <option value="4º AÑO TME B">4º AÑO TME B</option>
                    <option value="5º AÑO MMO A">5º AÑO MMO A</option>
                    <option value="5º AÑO MMO B">5º AÑO MMO B</option>
                    <option value="5º AÑO TME A">5º AÑO TME A</option>
                    <option value="5º AÑO TME B">5º AÑO TME B</option>
                    <option value="6º AÑO MMO A">6º AÑO MMO A</option>
                    <option value="6º AÑO MMO B">6º AÑO MMO B</option>
                    <option value="6º AÑO TME A">6º AÑO TME A</option>
                    <option value="6º AÑO TME B">6º AÑO TME B</option>
                    <option value="7º AÑO MMO A">7º AÑO MMO A</option>
                    <option value="7º AÑO MMO B">7º AÑO MMO B</option>
                    <option value="7º AÑO TME A">7º AÑO TME A</option>
                    <option value="7º AÑO TME B">7º AÑO TME B</option>
                </select>

            </Section>

            <section class="fila-inferior" style="display: flex; width: 100%; ">
                <select id="buscar-docente" placeholder="Escribe o selecciona un docente..."
                    style="width: 100%; height: 2.6em;"></select>
            </section>

        </div>
        <div style="display: flex; width: 100%;">
            <select id="selector-turno"
                style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; min-width: 140px;">
                <option selected value="mañana/tarde">Turno Mañana/Tarde (07:00 - 19:00)</option>
                <option value="mañana">Turno Mañana (07:00 - 14:00)</option>
                <option value="tarde">Turno Tarde (14:00 - 19:00)</option>
                <option value="noche">Turno Noche (19:00 - 23:00)</option>
                <option value="completo">Turno Completo (07:00 - 23:00)</option>
            </select>
        </div>
        <Section class="contenedor-acciones">
            <button id="btn-descargar" class="btn-accion btn-primario">📄 Imprimir Semana</button>
            <button id="btn-limpiar" class="btn-accion btn-secundario">🔄 Limpiar filtros</button>
        </Section>

        <div style="display: flex; width: 100%;">
            <select id="selector-vista"
                style="width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; min-width: 120px;">
                <option value="timeGridWeek">Vista: Semana</option>
                <option value="timeGridSemanaLaboral">Vista: Lun - Vie</option>
                <option value="timeGridTresDias">Vista: 3 días</option>
                <option value="timeGridDay">Vista: 1 día</option>
            </select>
        </div>

        <article id='calendar' class="modo-completo" translate="no"></article>
    </main>
    <footer id="footer">
        <div class="footer-principal">

            <figure class="footer-logo">
                <a href="https://it.unt.edu.ar">
                    <img src="assets/logo-it.jpg" alt="Logo Instituto Técnico">
                </a>
            </figure>

            <div class="footer-info">
                <p>Gral. Paz 920 - CP 4000</p>
                <p>San Miguel de Tucumán - Tucumán - Argentina</p>
                <p class="footer-cue">CUE: 909000400</p>
            </div>

            <div class="footer-redes">
                <a href="https://www.instagram.com/institutotecnico.unt" aria-label="Instagram">📷</a>
                <a href="#" aria-label="WhatsApp">💬</a>
                <a href="#" aria-label="Email">✉️</a>
                <a href="https://www.facebook.com/tecnicoUNT" aria-label="Facebook">📘</a>
            </div>

        </div>

        <div class="footer-copyright">
            <p>Copyright © 2026 | Instituto Técnico - UNT</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>

</html>
